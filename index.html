<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Sentinel - AI Claims Intelligence</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a1428 0%, #1a2338 100%);
      margin: 0;
      padding: 20px;
      color: #e2e8f0;
    }
    .container {
      max-width: 1100px;
      margin: auto;
      background: rgba(15, 23, 42, 0.95);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(to right, #0f172a, #1e40af);
      padding: 32px 40px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -1px;
    }
    .header h1 span { color: #60a5fa; }
    .header p {
      margin: 8px 0 0;
      font-size: 18px;
      color: #94a3b8;
    }

    /* Smaller Horizontal Buttons */
    .examples {
      padding: 20px 40px;
      background: #1e2937;
      display: flex;
      flex-wrap: nowrap;
      gap: 10px;
      justify-content: center;
      overflow-x: auto;
    }
    .example-btn {
      padding: 10px 18px;
      background: #334155;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: auto;
    }
    .example-btn:hover { 
      background: #3b82f6; 
      transform: translateY(-2px);
    }

    .form-container { padding: 40px; background: #0f172a; }
    .field { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #94a3b8; }
    input {
      width: 100%;
      padding: 16px;
      background: #1e2937;
      border: 1px solid #475569;
      border-radius: 12px;
      color: white;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      color: white;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .result {
      margin: 30px;
      padding: 30px;
      background: #1e2937;
      border-radius: 16px;
      border: 1px solid #334155;
    }
    .savings-box {
      background: #052e16;
      border: 1px solid #4ade80;
      border-radius: 12px;
      padding: 20px;
      margin: 25px 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Quantum<span>Sentinel</span></h1>
      <p>Real-Time Fraud Detection • Predictive Analytics • Savings Engine</p>
    </div>

    <div class="examples">
      <button class="example-btn" onclick="loadExample(1)">🔴 High Risk Claim</button>
      <button class="example-btn" onclick="loadExample(2)">🟢 Normal Claim</button>
      <button class="example-btn" onclick="loadExample(3)">🟠 Medium Risk Claim</button>
    </div>

    <div class="form-container">
      <form id="claimForm">
        <div class="field"><label>Member Age</label><input type="number" id="member_age" value="47" required></div>
        <div class="field"><label>Billed Amount ($)</label><input type="number" id="billed_amount" value="4285" required></div>
        <div class="field"><label>Days Since Injury</label><input type="number" id="days_since_injury" value="1" required></div>
        <div class="field"><label>Number of Procedures</label><input type="number" id="num_procedures" value="6" required></div>
        <div class="field"><label>Procedure CPT Code</label><input type="text" id="procedure_cpt" value="99214"></div>
        <div class="field"><label>Diagnosis ICD Code</label><input type="text" id="diagnosis_icd" value="M54.5"></div>
        <div class="field"><label>Claim Type</label><input type="text" id="claim_type" value="WorkersComp"></div>

        <button type="submit" id="analyzeBtn">🚀 Analyze Claim</button>
      </form>
    </div>

    <div id="result" class="result" style="display:none;"></div>
  </div>

  <script>
    function loadExample(n) {
      if (n === 1) {
        document.getElementById('billed_amount').value = 4285;
        document.getElementById('days_since_injury').value = 1;
        document.getElementById('num_procedures').value = 6;
      } else if (n === 2) {
        document.getElementById('billed_amount').value = 875;
        document.getElementById('days_since_injury').value = 45;
        document.getElementById('num_procedures').value = 1;
      } else if (n === 3) {
        document.getElementById('billed_amount').value = 2450;
        document.getElementById('days_since_injury').value = 8;
        document.getElementById('num_procedures').value = 5;
      }
    }

    document.getElementById('claimForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('analyzeBtn');
      btn.textContent = 'Analyzing...';
      btn.disabled = true;

      const data = {
        member_age: parseInt(document.getElementById('member_age').value),
        billed_amount: parseFloat(document.getElementById('billed_amount').value),
        days_since_injury: parseInt(document.getElementById('days_since_injury').value),
        num_procedures: parseInt(document.getElementById('num_procedures').value),
        procedure_cpt: document.getElementById('procedure_cpt').value,
        diagnosis_icd: document.getElementById('diagnosis_icd').value,
        claim_type: document.getElementById('claim_type').value
      };

      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();

        const savings = result.savings_tracking || { incremental_savings: 0, shared_savings: 0 };

        document.getElementById('result').innerHTML = `
          <h2>${result.claim_summary.risk_level} • Score: ${result.claim_summary.fraud_score}</h2>
          <p><strong>Recommended Action:</strong> ${result.claim_summary.recommended_action}</p>
          <ul>${result.claim_summary.fraud_reasons.map(r => `<li>⚠️ ${r}</li>`).join('')}</ul>

          <div class="savings-box">
            <h3>💰 Savings Impact</h3>
            <p>Incremental Savings: <strong>$${savings.incremental_savings}</strong></p>
            <p>Shared Savings (8%): <strong>$${savings.shared_savings}</strong></p>
          </div>

          <hr style="border-color:#475569">
          <p><strong>Predicted Total Cost:</strong> $${result.predictions.predicted_cost}</p>
          <p><strong>Forecasted RTW:</strong> ${result.predictions.forecasted_rtw_days} days</p>
          <p><strong>Provider Score:</strong> ${result.predictions.provider_score}</p>
          <p><strong>Steer Recommendation:</strong> ${result.predictions.steer_recommendation}</p>
        `;
        document.getElementById('result').style.display = 'block';
      } catch (err) {
        document.getElementById('result').innerHTML = `<p style="color:#ef4444;">Error analyzing claim. Please try again.</p>`;
        document.getElementById('result').style.display = 'block';
      }

      btn.textContent = '🚀 Analyze Claim';
      btn.disabled = false;
    });
  </script>
</body>
</html>
