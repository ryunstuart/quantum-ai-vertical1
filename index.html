<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Sentinel - AI Claims Intelligence</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a1428 0%, #1a2338 100%);
      margin: 0;
      padding: 20px;
      color: #e2e8f0;
    }
    .container {
      max-width: 1100px;
      margin: auto;
      background: rgba(15, 23, 42, 0.95);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      border: 1px solid #334155;
    }
    .header {
      background: linear-gradient(90deg, #1e40af, #3b82f6);
      padding: 28px 40px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: relative;
    }
    .logo {
      width: 52px;
      height: 52px;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
    }
    .header-content h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header-content p {
      margin: 4px 0 0;
      font-size: 17px;
      opacity: 0.95;
    }
    .badge {
      position: absolute;
      top: 25px;
      right: 40px;
      background: rgba(16, 185, 129, 0.2);
      color: #4ade80;
      padding: 6px 14px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .examples {
      padding: 20px 40px;
      background: #1e2937;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .example-btn {
      padding: 12px 24px;
      background: #334155;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .example-btn:hover {
      background: #3b82f6;
      transform: translateY(-2px);
    }

    .form-container {
      padding: 40px;
      background: #0f172a;
    }
    .field { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #94a3b8; }
    input {
      width: 100%;
      padding: 16px;
      background: #1e2937;
      border: 1px solid #475569;
      border-radius: 12px;
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      color: white;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 10px;
    }

    .result {
      margin: 30px;
      padding: 30px;
      background: #1e2937;
      border-radius: 16px;
      border: 1px solid #334155;
    }
    .savings-box {
      background: #052e16;
      border: 1px solid #4ade80;
      border-radius: 12px;
      padding: 20px;
      margin: 25px 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🛡️</div>
      <div class="header-content">
        <h1>Quantum Sentinel</h1>
        <p>AI Claims Intelligence</p>
      </div>
      <div class="badge">
        <i class="fas fa-circle" style="font-size:10px;"></i>
        AI-Powered
      </div>
    </div>

    <div class="examples">
      <button class="example-btn" onclick="loadExample(1)">🔴 High Risk Claim</button>
      <button class="example-btn" onclick="loadExample(2)">🟢 Normal Claim</button>
      <button class="example-btn" onclick="loadExample(3)">🟠 Medium Risk Claim</button>
    </div>

    <div class="form-container">
      <form id="claimForm">
        <!-- Your form fields here (same as before) -->
        <div class="field"><label>Member Age</label><input type="number" id="member_age" value="47" required></div>
        <div class="field"><label>Billed Amount ($)</label><input type="number" id="billed_amount" value="4285" required></div>
        <div class="field"><label>Days Since Injury</label><input type="number" id="days_since_injury" value="1" required></div>
        <div class="field"><label>Number of Procedures</label><input type="number" id="num_procedures" value="6" required></div>
        <div class="field"><label>Procedure CPT Code</label><input type="text" id="procedure_cpt" value="99214"></div>
        <div class="field"><label>Diagnosis ICD Code</label><input type="text" id="diagnosis_icd" value="M54.5"></div>
        <div class="field"><label>Claim Type</label><input type="text" id="claim_type" value="WorkersComp"></div>

        <button type="submit">🚀 Analyze Claim</button>
      </form>
    </div>

    <div id="result" class="result" style="display:none;"></div>
  </div>

  <!-- Your existing script stays the same -->
  <script>
    // Paste your current JavaScript here (loadExample + form submit)
    // ... (keep the script from the previous version)
  </script>
</body>
</html>
