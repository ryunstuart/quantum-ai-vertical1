<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum One AI - Claim Intelligence</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      margin: 0;
      padding: 20px;
      color: #1e2937;
    }
    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .header {
      background: #1e40af;
      color: white;
      padding: 25px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 28px;
    }
    .form-container {
      padding: 30px;
    }
    input, select {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 16px;
      background: #1e40af;
      color: white;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover {
      background: #2563eb;
    }
    .result {
      margin: 20px;
      padding: 25px;
      background: #f8fafc;
      border-radius: 12px;
      border-left: 8px solid #1e40af;
    }
    .high { border-left-color: #ef4444; }
    .medium { border-left-color: #f59e0b; }
    ul { padding-left: 20px; }
    li { margin: 8px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔍 Quantum One AI Claim Intelligence</h1>
      <p>Real-time Fraud Detection + Predictive Analytics</p>
    </div>

    <div class="form-container">
      <form id="claimForm">
        <input type="number" id="member_age" placeholder="Member Age" value="47" required>
        <input type="number" id="billed_amount" placeholder="Billed Amount ($)" value="4285" required>
        <input type="number" id="days_since_injury" placeholder="Days Since Injury" value="1" required>
        <input type="number" id="num_procedures" placeholder="Number of Procedures" value="6" required>
        <input type="text" id="procedure_cpt" placeholder="Procedure CPT Code" value="99214">
        <input type="text" id="diagnosis_icd" placeholder="Diagnosis ICD Code" value="M54.5">
        <input type="text" id="claim_type" placeholder="Claim Type" value="WorkersComp">

        <button type="submit">🚀 Analyze Claim</button>
      </form>
    </div>

    <div id="result" class="result" style="display:none;"></div>
  </div>

  <script>
    document.getElementById('claimForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const button = e.target.querySelector('button');
      button.textContent = 'Analyzing...';
      button.disabled = true;

      const data = {
        member_age: parseInt(document.getElementById('member_age').value),
        billed_amount: parseFloat(document.getElementById('billed_amount').value),
        days_since_injury: parseInt(document.getElementById('days_since_injury').value),
        num_procedures: parseInt(document.getElementById('num_procedures').value),
        procedure_cpt: document.getElementById('procedure_cpt').value,
        diagnosis_icd: document.getElementById('diagnosis_icd').value,
        claim_type: document.getElementById('claim_type').value
      };

      const res = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await res.json();
      const div = document.getElementById('result');
      
      let riskClass = '';
      if (result.claim_summary.risk_level.includes('HIGH')) riskClass = 'high';
      else if (result.claim_summary.risk_level.includes('MEDIUM')) riskClass = 'medium';

      div.className = `result ${riskClass}`;
      div.innerHTML = `
        <h2>${result.claim_summary.risk_level} • Score: ${result.claim_summary.fraud_score}</h2>
        <p><strong>Action:</strong> ${result.claim_summary.recommended_action}</p>
        <ul>
          ${result.claim_summary.fraud_reasons.map(r => `<li>⚠️ ${r}</li>`).join('')}
        </ul>
        <hr>
        <p><strong>Predicted Total Cost:</strong> $${result.predictions.predicted_cost}</p>
        <p><strong>Forecasted RTW:</strong> ${result.predictions.forecasted_rtw_days} days</p>
        <p><strong>Provider Score:</strong> ${result.predictions.provider_score}</p>
        <p><strong>Steer Recommendation:</strong> ${result.predictions.steer_recommendation}</p>
      `;
      div.style.display = 'block';

      button.textContent = '🚀 Analyze Claim';
      button.disabled = false;
    });
  </script>
</body>
</html>
