<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Sentinel - AI Claims Intelligence</title>
  <link rel="icon" href="https://raw.githubusercontent.com/ryunstuart/quantum-ai-vertical1/main/quantum-shield.png" type="image/png">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0f1c 0%, #1a2338 100%);
      margin: 0;
      padding: 20px;
      color: #e2e8f0;
    }
    .container {
      max-width: 1100px;
      margin: auto;
      background: rgba(15, 23, 42, 0.98);
      border-radius: 24px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
      overflow: hidden;
      border: 1px solid #475569;
    }

    .header { 
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); 
      padding: 38px 40px; 
      display: flex; 
      align-items: center; 
      gap: 28px; 
    }
    .logo { 
      width: 98px; 
      height: 98px; 
      border-radius: 20px; 
      box-shadow: 0 0 55px rgba(147, 197, 253, 0.95); 
      object-fit: contain;
    }
    .header-content h1 { 
      margin: 0; 
      font-size: 46px; 
      font-weight: 700; 
      letter-spacing: -2.2px; 
    }
    .header-content h1 span { color: #bae6fd; }
    .header-content p { 
      margin: 8px 0 0; 
      font-size: 19.5px; 
      opacity: 0.96; 
    }

    .examples {
      padding: 32px 40px;
      background: #1e2937;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      border-bottom: 1px solid #334155;
    }
    .example-btn {
      padding: 14px 32px;
      background: #334155;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15.5px;
      min-width: 200px;
      transition: all 0.3s ease;
    }
    .example-btn:hover {
      background: #60a5fa;
      transform: translateY(-4px);
      box-shadow: 0 12px 25px rgba(96, 165, 250, 0.5);
    }

    .form-container { 
      padding: 40px; 
      background: #0f172a; 
      opacity: 0.6;
      pointer-events: none;
    }

    .result {
      margin: 32px;
      padding: 40px;
      background: linear-gradient(145deg, #1e2937, #172033);
      border-radius: 22px;
      border: 1px solid #475569;
      display: none;
    }
    .savings-box {
      background: linear-gradient(135deg, #052e16, #166534);
      border: 2px solid #4ade80;
      border-radius: 16px;
      padding: 28px;
      margin: 30px 0;
      text-align: center;
      animation: glow 2s infinite alternate;
    }
    @keyframes glow {
      from { box-shadow: 0 0 15px #4ade80; }
      to { box-shadow: 0 0 35px #4ade80; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="https://raw.githubusercontent.com/ryunstuart/quantum-ai-vertical1/main/quantum-shield.png" alt="Quantum Sentinel" class="logo">
      <div class="header-content">
        <h1>Quantum<span>Sentinel</span></h1>
        <p>Real-Time Fraud Detection • Predictive Analytics • Savings Engine</p>
      </div>
    </div>

    <div class="examples">
      <strong style="color:#94a3b8; margin-bottom: 16px; display:block; text-align:center; font-size:17px;">Click any sample claim below to see Quantum Sentinel in action:</strong>
      <button class="example-btn" onclick="loadExample(1)">🔴 High Risk Claim</button>
      <button class="example-btn" onclick="loadExample(2)">🟢 Normal Claim</button>
      <button class="example-btn" onclick="loadExample(3)">🟠 Medium Risk Claim</button>
    </div>

    <div class="form-container">
      <form id="claimForm">
        <div class="form-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:28px 40px;">
          <div><label>Member Age</label><input type="number" id="member_age" value="47" disabled></div>
          <div><label>Billed Amount ($)</label><input type="number" id="billed_amount" value="4285" disabled></div>
          <div><label>Days Since Injury</label><input type="number" id="days_since_injury" value="1" disabled></div>
          <div><label>Number of Procedures</label><input type="number" id="num_procedures" value="6" disabled></div>
          <div><label>Procedure CPT Code</label><input type="text" id="procedure_cpt" value="99214" disabled></div>
          <div><label>Diagnosis ICD Code</label><input type="text" id="diagnosis_icd" value="M54.5" disabled></div>
          <div><label>Claim Type</label><input type="text" id="claim_type" value="WorkersComp" disabled></div>
        </div>
      </form>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    function loadExample(n) {
      let billed = 0, days = 0, procs = 0;
      if (n === 1) { billed = 4285; days = 1; procs = 6; }
      else if (n === 2) { billed = 875; days = 45; procs = 1; }
      else if (n === 3) { billed = 2450; days = 8; procs = 5; }

      // Update disabled fields for visual
      document.getElementById('billed_amount').value = billed;
      document.getElementById('days_since_injury').value = days;
      document.getElementById('num_procedures').value = procs;

      // Trigger analysis
      const data = {
        member_age: 47,
        billed_amount: billed,
        days_since_injury: days,
        num_procedures: procs,
        procedure_cpt: "99214",
        diagnosis_icd: "M54.5",
        claim_type: "WorkersComp"
      };

      fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(res => res.json())
      .then(result => {
        const savings = result.savings_tracking || { incremental_savings: 0, shared_savings: 0 };
        document.getElementById('result').innerHTML = `
          <h2>${result.claim_summary.risk_level} • Score: ${result.claim_summary.fraud_score}</h2>
          <p><strong>Recommended Action:</strong> ${result.claim_summary.recommended_action}</p>
          <ul>${(result.claim_summary.fraud_reasons || []).map(r => `<li>⚠️ ${r}</li>`).join('')}</ul>

          <div class="savings-box">
            <h3>💰 Savings Impact</h3>
            <p>Incremental Savings: <strong>$${savings.incremental_savings}</strong></p>
            <p>Shared Savings (8%): <strong>$${savings.shared_savings}</strong></p>
          </div>

          <hr style="border-color:#475569; margin:28px 0;">
          <p><strong>Predicted Total Cost:</strong> $${result.predictions.predicted_cost}</p>
          <p><strong>Forecasted RTW:</strong> ${result.predictions.forecasted_rtw_days} days</p>
          <p><strong>Provider Score:</strong> ${result.predictions.provider_score}</p>
          <p><strong>Steer Recommendation:</strong> ${result.predictions.steer_recommendation}</p>
        `;
        document.getElementById('result').style.display = 'block';
      })
      .catch(() => {
        document.getElementById('result').innerHTML = `<p style="color:#ef4444; text-align:center;">Demo mode active — using sample data only.</p>`;
        document.getElementById('result').style.display = 'block';
      });
    }
  </script>
</body>
</html>
