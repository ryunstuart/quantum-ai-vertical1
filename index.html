<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Sentinel - AI Claims Intelligence</title>
  <link rel="icon" href="https://raw.githubusercontent.com/ryunstuart/quantum-ai-vertical1/main/quantum-shield.png" type="image/png">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0f1c 0%, #1a2338 100%);
      margin: 0;
      padding: 20px;
      color: #e2e8f0;
    }
    .container {
      max-width: 1100px;
      margin: auto;
      background: rgba(15, 23, 42, 0.98);
      border-radius: 24px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
      overflow: hidden;
      border: 1px solid #475569;
    }

    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      padding: 38px 40px;
      display: flex;
      align-items: center;
      gap: 28px;
      box-shadow: inset 0 -8px 20px rgba(0, 0, 0, 0.3);
    }
    .logo {
      width: 98px;
      height: 98px;
      flex-shrink: 0;
      border-radius: 20px;
      box-shadow: 0 0 55px rgba(147, 197, 253, 0.95);
      transition: transform 0.4s ease;
    }
    .logo:hover { transform: scale(1.08) rotate(6deg); }

    .header-content h1 {
      margin: 0;
      font-size: 46px;
      font-weight: 700;
      letter-spacing: -2.2px;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
    }
    .header-content h1 span { color: #bae6fd; }
    .header-content p {
      margin: 8px 0 0;
      font-size: 19.5px;
      opacity: 0.96;
      letter-spacing: -0.4px;
    }

    .examples {
      padding: 28px 40px;
      background: #1e2937;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid #334155;
    }
    .example-btn {
      padding: 13px 30px;
      background: #334155;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15.2px;
      width: 290px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .example-btn:hover {
      background: #60a5fa;
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(96, 165, 250, 0.5);
    }

    /* Two-Column Form */
    .form-container { 
      padding: 42px 40px; 
      background: #0f172a; 
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px 32px;
    }
    .form-grid .field {
      margin-bottom: 0;
    }
    .full-width {
      grid-column: 1 / -1;
    }

    label { 
      display: block; 
      margin-bottom: 9px; 
      font-weight: 600; 
      color: #94a3b8;
      font-size: 14.8px;
      letter-spacing: 0.3px;   /* Reduced spacing */
    }
    input {
      width: 100%;
      padding: 17px 18px;
      background: #1e2937;
      border: 1px solid #475569;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.2);
      outline: none;
    }

    button {
      width: 100%;
      padding: 19px;
      background: linear-gradient(90deg, #2563eb, #3b82f6);
      color: white;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
      margin-top: 12px;
    }
    button:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 40px rgba(37, 99, 235, 0.5);
    }

    /* Premium Result Card */
    .result {
      margin: 32px;
      padding: 40px;
      background: linear-gradient(145deg, #1e2937, #172033);
      border-radius: 22px;
      border: 1px solid #475569;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                  inset 0 4px 15px rgba(255,255,255,0.03);
      animation: fadeInUp 0.6s ease forwards;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .savings-box {
      background: linear-gradient(135deg, #052e16, #166534);
      border: 2px solid #4ade80;
      border-radius: 16px;
      padding: 28px;
      margin: 30px 0;
      text-align: center;
      box-shadow: 0 0 35px rgba(74, 222, 128, 0.6);
      animation: glow 2.8s infinite alternate ease-in-out;
    }
    @keyframes glow {
      from { box-shadow: 0 0 20px rgba(74, 222, 128, 0.4); }
      to { box-shadow: 0 0 45px rgba(74, 222, 128, 0.75); }
    }

    .result h2 {
      margin: 0 0 18px;
      font-size: 26px;
      font-weight: 700;
      color: #bae6fd;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="https://raw.githubusercontent.com/ryunstuart/quantum-ai-vertical1/main/quantum-shield.png" 
           alt="Quantum Sentinel" class="logo">
      <div class="header-content">
        <h1>Quantum<span>Sentinel</span></h1>
        <p>Real-Time Fraud Detection • Predictive Analytics • Savings Engine</p>
      </div>
    </div>

    <div class="examples">
      <strong style="color:#94a3b8; margin-bottom: 12px; font-size:15px;">Try Sample Claims:</strong>
      <button class="example-btn" onclick="loadExample(1)">🔴 High Risk Claim</button>
      <button class="example-btn" onclick="loadExample(2)">🟢 Normal Claim</button>
      <button class="example-btn" onclick="loadExample(3)">🟠 Medium Risk Claim</button>
    </div>

    <div class="form-container">
      <form id="claimForm">
        <div class="form-grid">
          <div class="field"><label>Member Age</label><input type="number" id="member_age" value="47" required></div>
          <div class="field"><label>Billed Amount ($)</label><input type="number" id="billed_amount" value="4285" required></div>
          
          <div class="field"><label>Days Since Injury</label><input type="number" id="days_since_injury" value="1" required></div>
          <div class="field"><label>Number of Procedures</label><input type="number" id="num_procedures" value="6" required></div>
          
          <div class="field"><label>Procedure CPT Code</label><input type="text" id="procedure_cpt" value="99214"></div>
          <div class="field"><label>Diagnosis ICD Code</label><input type="text" id="diagnosis_icd" value="M54.5"></div>
          
          <div class="field"><label>Claim Type</label><input type="text" id="claim_type" value="WorkersComp"></div>
        </div>

        <button type="submit" id="analyzeBtn">🚀 Analyze Claim</button>
      </form>
    </div>

    <div id="result" class="result" style="display:none;"></div>
  </div>

  <script>
    function loadExample(n) {
      if (n === 1) { 
        document.getElementById('billed_amount').value = 4285;
        document.getElementById('days_since_injury').value = 1;
        document.getElementById('num_procedures').value = 6;
      } else if (n === 2) { 
        document.getElementById('billed_amount').value = 875;
        document.getElementById('days_since_injury').value = 45;
        document.getElementById('num_procedures').value = 1;
      } else if (n === 3) { 
        document.getElementById('billed_amount').value = 2450;
        document.getElementById('days_since_injury').value = 8;
        document.getElementById('num_procedures').value = 5;
      }
    }

    document.getElementById('claimForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('analyzeBtn');
      btn.textContent = 'Analyzing...';
      btn.disabled = true;

      const data = {
        member_age: parseInt(document.getElementById('member_age').value),
        billed_amount: parseFloat(document.getElementById('billed_amount').value),
        days_since_injury: parseInt(document.getElementById('days_since_injury').value),
        num_procedures: parseInt(document.getElementById('num_procedures').value),
        procedure_cpt: document.getElementById('procedure_cpt').value,
        diagnosis_icd: document.getElementById('diagnosis_icd').value,
        claim_type: document.getElementById('claim_type').value
      };

      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();

        const savings = result.savings_tracking || { incremental_savings: 0, shared_savings: 0 };

        document.getElementById('result').innerHTML = `
          <h2>${result.claim_summary.risk_level} • Score: ${result.claim_summary.fraud_score}</h2>
          <p><strong>Recommended Action:</strong> ${result.claim_summary.recommended_action}</p>
          <ul>${result.claim_summary.fraud_reasons.map(r => `<li>⚠️ ${r}</li>`).join('')}</ul>

          <div class="savings-box">
            <h3>💰 Savings Impact</h3>
            <p>Incremental Savings: <strong>$${savings.incremental_savings}</strong></p>
            <p>Shared Savings (8%): <strong>$${savings.shared_savings}</strong></p>
          </div>

          <hr style="border-color:#475569; margin: 28px 0;">
          <p><strong>Predicted Total Cost:</strong> $${result.predictions.predicted_cost}</p>
          <p><strong>Forecasted RTW:</strong> ${result.predictions.forecasted_rtw_days} days</p>
          <p><strong>Provider Score:</strong> ${result.predictions.provider_score}</p>
          <p><strong>Steer Recommendation:</strong> ${result.predictions.steer_recommendation}</p>
        `;
        document.getElementById('result').style.display = 'block';
      } catch (err) {
        document.getElementById('result').innerHTML = `<p style="color:#ef4444;">Error analyzing claim. Please try again.</p>`;
        document.getElementById('result').style.display = 'block';
      }

      btn.textContent = '🚀 Analyze Claim';
      btn.disabled = false;
    });
  </script>
</body>
</html>
