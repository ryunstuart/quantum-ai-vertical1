<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Sentinel | Real-Time Claims Intelligence</title>
  <link rel="icon" href="https://picsum.photos/id/1015/32/32" type="image/x-icon">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      margin: 0;
      padding: 20px;
      color: #1e2937;
    }
    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(90deg, #1e40af, #3b82f6);
      color: white;
      padding: 25px 30px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .logo {
      width: 80px;
      height: 80px;
      flex-shrink: 0;
      border-radius: 12px;
      background: #1e40af;
    }
    .header-content h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
    }
    .header-content p {
      margin: 6px 0 0;
      font-size: 17px;
      opacity: 0.95;
    }
    /* Your existing styles for examples, form, result, etc. */
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <!-- Using a direct hosted image for reliability -->
      <img src="https://picsum.photos/id/1015/80/80" alt="Quantum Sentinel" class="logo">
      <div class="header-content">
        <h1>Quantum Sentinel</h1>
        <p>Real-Time Fraud Detection • Predictive Analytics • Savings Engine</p>
      </div>
    </div>

    <!-- Rest of your dashboard (examples, form, result) -->
    <div class="examples">
      <strong style="margin-right: 15px; align-self: center;">Quick Test Claims:</strong>
      <button class="example-btn" onclick="loadExample(1)">🔴 High Risk Claim</button>
      <button class="example-btn" onclick="loadExample(2)">🟢 Normal Claim</button>
      <button class="example-btn" onclick="loadExample(3)">🟠 Medium Risk Claim</button>
    </div>

    <div class="form-container">
      <form id="claimForm">
        <div class="field"><label>Member Age</label><input type="number" id="member_age" value="47" required></div>
        <div class="field"><label>Billed Amount ($)</label><input type="number" id="billed_amount" value="4285" required></div>
        <div class="field"><label>Days Since Injury</label><input type="number" id="days_since_injury" value="1" required></div>
        <div class="field"><label>Number of Procedures</label><input type="number" id="num_procedures" value="6" required></div>
        <div class="field"><label>Procedure CPT Code</label><input type="text" id="procedure_cpt" value="99214"></div>
        <div class="field"><label>Diagnosis ICD Code</label><input type="text" id="diagnosis_icd" value="M54.5"></div>
        <div class="field"><label>Claim Type</label><input type="text" id="claim_type" value="WorkersComp"></div>

        <button type="submit" id="analyzeBtn">
          <span class="spinner" id="spinner"></span>
          <span id="btnText">🚀 Analyze Claim</span>
        </button>
      </form>
    </div>

    <div id="result" class="result" style="display:none;"></div>
  </div>

  <script>
    // Your existing script here (loadExample + form submit)
    function loadExample(n) { /* your existing function */ }
    // ... rest of your script
  </script>
</body>
</html>
